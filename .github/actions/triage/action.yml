name: 'KennyBot Issue Triage'
description: 'Run KennyBot issue triage on a GitHub issue — searches for duplicates, assesses validity, and closes invalid issues.'
author: 'jpenilla'

inputs:
  issue-number:
    description: 'The GitHub issue number to triage'
    required: true
  model:
    description: >
      The LLM model to use. See https://flueframework.com/ for available models
      and their required API key environment variables.
      Example: opencode-go/deepseek-v4-flash, anthropic/claude-sonnet-4-6
    required: false
    default: 'opencode-go/deepseek-v4-flash'
  custom-skill-path:
    description: >
      Path to a custom SKILL.md that replaces KennyBot's default triage skill,
      relative to the consuming repo root. The skill is staged as 'kennybot-triage'
      so it won't conflict with your own agents' skills.
      Example: .github/kennybot-triage.md
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install KennyBot dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}/../../..

    - name: Stage triage skill
      shell: bash
      run: |
        mkdir -p .agents/skills/kennybot-triage
        dst='.agents/skills/kennybot-triage/SKILL.md'
        if [ -n '${{ inputs.custom-skill-path }}' ]; then
          cp '${{ inputs.custom-skill-path }}' "$dst"
          echo 'Using custom triage skill from ${{ inputs.custom-skill-path }}'
        elif [ ! -f "$dst" ]; then
          src='${{ github.action_path }}/../../../.agents/skills/kennybot-triage/SKILL.md'
          cp "$src" "$dst"
          echo 'Using KennyBot built-in triage skill'
        else
          echo 'Triage skill already present, skipping copy'
        fi

    - name: Run triage agent
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        KENNYBOT_ROOT='${{ github.action_path }}/../../..'
        npx --prefix "$KENNYBOT_ROOT" flue run triage --target node \
          --id "triage-${{ inputs.issue-number }}" \
          --payload '{"issueNumber":${{ inputs.issue-number }},"model":"${{ inputs.model }}"}' \
          --workspace "$KENNYBOT_ROOT"
