name: 'KennyBot Issue Process'
description: 'Process a KennyBot triage decision — close, comment, or label an issue. No LLM involvement, pure deterministic JS.'
author: 'jpenilla'

inputs:
  decision:
    description: 'JSON string containing the triage decision from the analyze step'
    required: true
  issue-number:
    description: 'The GitHub issue number to act on'
    required: true
  trigger-label:
    description: >
      Optional label name that will be removed after processing. Used for
      label-triggered manual triage — adding this label to an issue triggers
      triage, and the script cleans it up automatically.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install KennyBot dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}/../../..

    - name: Process decision
      shell: bash
      env:
        DECISION: ${{ inputs.decision }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
        TRIGGER_LABEL: ${{ inputs.trigger-label }}
        GH_TOKEN: ${{ github.token }}
      run: node '${{ github.action_path }}/../../../process/process.mjs'
